services:
  postgres:
    image: postgres:16-alpine
    container_name: ats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ats
    ports:
      - "5432:5432"
    volumes:
      - ats_pgdata:/var/lib/postgresql/data

volumes:
  ats_pgdata:
